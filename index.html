<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyan Magic AI Device</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
<link rel="Amanifest" href="Amanifest.json">
<meta name="theme-color" content="#00d2ff">
    
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <style>
        :root { --magic-glow: #00d2ff; --bg-dark: #0f0c29; }
        body { 
            margin: 0; background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif; color: white; height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* DEVICE SCREEN */
       .device-frame {
    width: 100vw; 
    height: 100vh; 
    max-width: none; 
    margin-top: 0; 
    border-radius: 0; /* Full screen ke liye corners hatayein */
    display: flex;
    flex-direction: column;
}

        /* MAGIC LENS (CAMERA AREA) */
        #camera-preview {
            width: 100%; height: 200px; background: #000; border-radius: 38px 38px 0 0;
            object-fit: cover; display: none;
        }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; font-size: 15px; }
        
        /* MAGIC UI CONTROLS */
        .controls {
            padding: 20px; display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.3); border-radius: 0 0 40px 40px;
        }

        .btn-magic {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 24px; transition: 0.3s;
            box-shadow: 0 0 15px var(--magic-glow);
        }
        .btn-camera { background: #ff7675; color: white; }
        .btn-mic { background: var(--magic-glow); color: white; }
        .btn-send { background: #55efc4; color: #111; border-radius: 15px; width: 80px; }

        input {
            width: 70%; padding: 12px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.2); color: white; outline: none;
        }
        
        .status-dot { width: 10px; height: 10px; background: #55efc4; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="device-frame">
    <video id="camera-preview" autoplay playsinline></video>
    <div style="padding: 15px 20px 0;">
        <span class="status-dot"></span> <b>Gyan Magic AI v1.0</b>
    </div>
    
    <div id="display" class="chat-area">
        <p>Namaste! Main aapka AI Guru hoon. <br><br>📸 Photo kheenchiye, 🎤 Boliye ya ⌨️ Likhiye... main har sawal ka jawab doonga!</p>
    </div>

    <div style="display: flex; padding: 10px; gap: 5px;">
        <input type="text" id="userInput" placeholder="Sawal pucho...">
        <button class="btn-magic btn-send" onclick="askAI()">ASK</button>
    </div>

    <div class="controls">
        <button class="btn-magic btn-camera" onclick="openCamera()">📷</button>
        <button class="btn-magic btn-mic" onclick="startVoice()">🎤</button>
    </div>
    
    <div style="position: absolute; top: 20px; right: 20px; z-index: 10;">
    <button onclick="openSettings()" style="background:none; border:none; font-size:20px; cursor:pointer;">⚙️</button>
</div>

<div id="settingsModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#24243e; padding:20px; border-radius:20px; border:1px solid cyan; z-index:100; width:80%;">
    <h3>⚙️ AI Settings</h3>
    <p style="font-size:12px;">Apni Gemini API Key yahan daalein:</p>
    <input type="password" id="apiKeyInput" placeholder="Paste API Key here..." style="width:90%; margin-bottom:10px;">
    <button onclick="saveKey()" style="background:cyan; color:black; border:none; padding:10px; border-radius:10px; cursor:pointer; width:100%;">Save Key</button>
    <button onclick="closeSettings()" style="background:none; color:white; border:none; margin-top:10px; cursor:pointer; width:100%;">Cancel</button>
</div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="Aapp.js"></script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('Asw.js')
                .then(reg => console.log('Gyan Magic Live!'))
                .catch(err => console.log('PWA not supported locally'));
        });
    }
</script>

</body>
</html>
