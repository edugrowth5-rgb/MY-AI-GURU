<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyan Magic AI Device</title>
<link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="AIguru.png">
<link rel="apple-touch-icon" href="AIguru.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00d2ff">
    
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <style>
        :root { --magic-glow: #00d2ff; --bg-dark: #0f0c29; }
        body { 
            margin: 0; background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif; color: white; height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* DEVICE SCREEN */
       .device-frame {
    width: 100vw; 
    height: 100vh; 
    max-width: none; 
    margin-top: 0; 
    border-radius: 0; /* Full screen ke liye corners hatayein */
    display: flex;
    flex-direction: column;
}

        /* MAGIC LENS (CAMERA AREA) */
        #camera-preview {
            width: 100%; height: 200px; background: #000; border-radius: 38px 38px 0 0;
            object-fit: cover; display: none;
        }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; font-size: 15px; }
        
        /* MAGIC UI CONTROLS */
        .controls {
            padding: 20px; display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.3); border-radius: 0 0 40px 40px;
        }

        .btn-magic {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 24px; transition: 0.3s;
            box-shadow: 0 0 15px var(--magic-glow);
        }
        .btn-camera { background: #ff7675; color: white; }
        .btn-mic { background: var(--magic-glow); color: white; }
        .btn-send { background: #55efc4; color: #111; border-radius: 15px; width: 80px; }

        input {
            width: 70%; padding: 12px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.2); color: white; outline: none;
        }
        
        .status-dot { width: 10px; height: 10px; background: #55efc4; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="device-frame">
    <video id="camera-preview" autoplay playsinline></video>
    <div style="padding: 15px 20px 0;">
        <span class="status-dot"></span> <b>Gyan Magic AI v1.0</b>
    </div>
    
    <div id="display" class="chat-area">
        <p>Namaste! Main aapka AI Guru hoon. <br><br>📸 Photo kheenchiye, 🎤 Boliye ya ⌨️ Likhiye... main har sawal ka jawab doonga!</p>
    </div>

    <div style="display: flex; padding: 10px; gap: 5px;">
        <input type="text" id="userInput" placeholder="Sawal pucho...">
        <button class="btn-magic btn-send" onclick="askAI()">ASK</button>
    </div>

    <div class="controls">
        <button class="btn-magic btn-camera" onclick="openCamera()">📷</button>
        <button class="btn-magic btn-mic" onclick="startVoice()">🎤</button>
    </div>
    
    <div style="position: absolute; top: 20px; right: 20px; z-index: 10;">
    <button onclick="openSettings()" style="background:none; border:none; font-size:20px; cursor:pointer;">⚙️</button>
</div>

<div id="settingsModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1a2e; padding:25px; border-radius:15px; border:2px solid #00d2ff; z-index:1000; width:90%; max-width:400px; box-shadow: 0 0 20px rgba(0,210,255,0.5);">
    <h3 style="color:#00d2ff; margin-top:0;">Guru Settings</h3>
    
    <label style="color:#fff; display:block; margin-bottom:10px;">Gemini API Key:</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your key here..." style="width:100%; padding:10px; border-radius:8px; border:none; margin-bottom:20px; box-sizing:border-box;">
    
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="saveKey()" style="flex:1; background:#00d2ff; color:#000; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">Save Key</button>
        
        <button onclick="eraseKey()" style="flex:1; background:#ff4b2b; color:#fff; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">Erase Key</button>
        
        <button onclick="closeSettings()" style="width:100%; background:transparent; color:#bbb; border:1px solid #444; padding:8px; border-radius:8px; margin-top:5px; cursor:pointer;">Cancel</button>
    </div>
    
    <p style="font-size:12px; color:#777; margin-top:15px; text-align:center;">
        Get your free key at: <a href="https://aistudio.google.com/" target="_blank" style="color:#00d2ff;">Google AI Studio</a>
    </p>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="app.js"></script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Gyan Magic Live!'))
                .catch(err => console.log('PWA not supported locally'));
        });
    }
</script>

</body>
</html>
